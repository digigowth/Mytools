<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Converter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Text Converter</h1>
        <p>Convert your text instantly.</p>

        <textarea id="textBox" placeholder="Paste or type your text here..."></textarea>

        <div class="buttons">
            <button id="upperBtn">UPPERCASE</button>
            <button id="lowerBtn">lowercase</button>
            <button id="capitalBtn">Capitalize</button>
        </div>

        <div class="stats">
            <span>Characters: <strong id="charCount">0</strong></span>
            <span>Words: <strong id="wordCount">0</strong></span>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
