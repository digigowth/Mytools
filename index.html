<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Converter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Text Converter</h1>
        <p>Convert your text instantly.</p>

        <textarea id="textBox" placeholder="Paste or type your text here..."></textarea>

        <div class="buttons">
            <button id="uppercase-btn">UPPERCASE</button>
            <button id="lowerBtn">lowercase</button>
            <button id="capitalBtn">Capitalize</button>
            <button id="copyBtn">Copy Text</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3 id="charCount">0</h3>
                <p>Characters</p>
            </div>
            <div class="stat-card">
                <h3 id="wordCount">0</h3>
                <p>Words</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
