<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="gst.css">
</head>
<body>
    <header class="header">    
        <nav class="navbar">
    
            <a href="index.html" class="nav-link">
                Text Utility
            </a>
    
            <a href="gst.html" class="nav-link active">
                GST Calculator
            </a>
    
        </nav>
    
    </header>
    <div class="container">
    
        <h1>GST Calculator</h1>
    
        <p>Calculate GST, professional fee, and total amount instantly.</p>
    
        <div class="gst-form">    
    
            <div class="gst-row">
    
                <label for="fee">Professional Fee</label>
    
                <input type="number" id="fee" placeholder="Enter fee">
    
            </div>
    
            <div class="gst-row">
            
                <label for="govt-fee">Government Fee</label>
            
                <input type="number" id="govt-fee" placeholder="Enter Government Fee">
            
            </div>

            <div class="gst-row">
            
                <label for="price">Price Without GST</label>
            
                <input type="number" id="price" placeholder="Enter amount">
            
            </div>

            <div class="gst-row">
    
                <label for="gst">GST</label>
    
                <input type="number" id="gst" placeholder="GST Amount">
    
            </div>
    
            <div class="gst-row">
    
                <label for="total">Total Amount</label>
    
                <input type="number" id="total" placeholder="Total amount">
    
            </div>
    
        </div>
    
        <div class="buttons">    
            <button id="clear-btn">
                Clear
            </button>
    
        </div>
    
    </div>
    <script src="gst.js"></script>
</body>
</html>
